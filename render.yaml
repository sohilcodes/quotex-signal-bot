services:
  - type: web
    name: quotex-signal-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: QUOTEX_EMAIL
        sync: false
      - key: QUOTEX_PASSWORD
        sync: false
      - key: DEFAULT_TRADE_AMOUNT
        value: "1"
      - key: DEMO_MODE
        value: "true"
      - key: WEBHOOK_SECRET
        sync: false
